<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out</title>
    <!-- 1. ADD THE FONT AWESOME LINK HERE -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7f6;
        }

       
        .signout-card {
            width: 380px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #777;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .primary-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .primary-btn:hover {
            background: rgb(4,151,151);
        }

        .secondary-link {
            font-size: 14px;
            color: #999;
            text-decoration: none;
            margin-top: 15px;
            display: inline-block;
        }

        .secondary-link:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="signout-card">
        <h2>See you soon!</h2>
        <p>You have been successfully signed out of your account. We hope to see you back again soon.</p>

        <div class="btn-container">
            <a href="entrance.html" class="primary-btn">
                Sign In Again
            </a>
            <a href="#" class="secondary-link">Go to Homepage</a>
        </div>
    </div>

</body>
</html>
