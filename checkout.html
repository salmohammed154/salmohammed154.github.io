<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f0f4f4;
        }
        

        h2 {
            font-size: 50px;
            text-align: center;
            color: rgb(4, 151, 151);
            margin-top: 30px;
        }
        

        .box {
            width: 850px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgb(210, 215, 215);
        }
        
        label {
            display: block;
            margin-top: 20px;
            color:rgb(4, 151, 151);
            font-size:20px;

        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

       

      
    .rev {
    width: 100%;
    background-color: black;
    color: white;
    border: none;
    padding: 20px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 20px;
    transition: 0.2s;
    display: block;
    text-align: center;
    text-decoration: none;
    }

  .rev:hover {
    background-color: rgb(4, 151, 151);
  }

    </style>
</head>

<body>

<h2>Checkout</h2>

<div class="box">

    <form action="received.html">

        <label>Phone Number</label>
        <input type="text" placeholder="Please enter your phone" required>

        <label>City</label>
        <select required>
            <option value="">Select City</option>
            <option>Cairo</option>
            <option>Giza</option>
            
       </select>
        <label>Address</label>
        <input type="text" placeholder="Please enter your address" required>

        <label>Payment Method</label>
        <select required>
            <option value="">Select payment method</option>
            <option>Cash</option>
            <option>Visa</option>
        </select>
    
    <button type="submit" class="rev">Confirm Order</button>


    </form>


</div>

</body>
</html>
