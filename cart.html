<!DOCTYPE html>
<html>
<head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js">
    <link rel="stylesheet" href="style.css">  
<title>My Cart</title>

<style>

body {
    font-family: Arial;
    background-color: #f0f4f4;
    margin: 0;
    padding: 0;
}

h2 {
    text-align: center;
    color: rgb(4, 151, 151);
    font-size: 50px;
    margin-top: 30px;
    letter-spacing: 2px;
}

.cartBox {
    width: 800px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgb(210, 215, 215);
}

.item {
    display: flex;
    align-items: center;
    margin: 10px 0;
    padding: 10px;
    border-bottom: 1px solid #eee;
    gap: 10px;
    border-radius: 8px;
    transition: 0.2s;
     justify-content: space-between;  
}

.item:hover {
    background-color: #f9f9f9;
}

.item img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid rgb(4, 151, 151);
}

.item span {
    font-size: 14px;
    color: #333;
}

.price {
    color: rgb(4, 151, 151);
    font-weight: bold;
}

.delete {
    background-color: white;
    color: red;
    border: 2px solid red;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 12px;
    transition: all 0.2s;
    margin-left: auto;  
}

.delete:hover {
    background-color: red;
    color: white;
}

.total-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    padding: 10px;
    background-color: #f0f4f4;
    border-radius: 8px;
}

.total-box p {
    margin: 0;
    font-size: 16px;
    color: #333;
}

#total {
    font-weight: bold;
    color: rgb(4, 151, 151);
    font-size: 18px;
}

.check {
    width: 96%;
    background-color: black;
    color: white;
    padding: 20px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 20px;
    transition: 0.2s;
    display: block;
    text-align: center;
    text-decoration: none;
}

.check:hover {
    background-color: rgb(4, 151, 151);
}

</style>

</head>

<body>
   <header class="navbar">

   <div class="logo">
        <img src="pictures/logo2.png">
    </div>

    <nav class="links">
        <a href="index.html">Home</a>
        <a href="Products.html" class="active">Products</a>
        <a href="Services.html">Services</a>
        <a href="Clients.html">Clients</a>
        <a href="index.html">About us</a>
        <a href="index.html">Contact us</a>
    </nav>

    <div class="icons">

    <a href="#"><i class="fa-regular fa-heart"></i></a>

    <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="entrance.html"><i class="fa-regular fa-user"></i></a>

    <a href="Products.html"><i class="fa-solid fa-magnifying-glass"></i></a>
    <a href="exit.html"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>

    </div>
    </header> 

<h2> My Cart</h2>

<div class="cartBox">

    <div id="cartItems"></div>
     <div class="total-box">
    <p>Total: <span id="total">0</span> EGP</p>
    </div>
    <a href="checkout.html" class="check" >Checkout</a>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showCart(){

    let div = document.getElementById("cartItems");
    let total = 0;

    div.innerHTML = "";

    for(let i=0; i<cart.length; i++){

        total += cart[i].price;

        div.innerHTML += `
        <div class="item">
            <span>${cart[i].name}</span>
            <span class="price">${cart[i].price} EGP</span>
            <button class="delete" onclick="removeItem(${i})">❌</button>
        </div>
        `;
    }

    document.getElementById("total").innerText = total;
}

function removeItem(i){
    cart.splice(i, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    showCart();
}



showCart();

</script>

</body>
</html>
